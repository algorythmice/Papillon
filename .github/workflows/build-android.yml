name: Build Android

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed AAB
    if: github.repository == 'PapillonApp/Papillon'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create secrets.json
        env:
          APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
          SALT: ${{ secrets.COUNTLY_SALT }}
          SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
        run: |
          jq -n \
            --arg app_key "$APP_KEY" \
            --arg salt "$SALT" \
            --arg server_url "$SERVER_URL" \
            '{APP_KEY: $app_key, SALT: $salt, SERVER_URL: $server_url}' > secrets.json

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Decode keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: echo "$KEYSTORE" | base64 --decode > android/app/release.keystore

      - name: Calculate version code
        run: |
          # versionCode: seconds since 2020-01-01 UTC — unique, strictly increasing, well under the 2.1e9 cap
          VERSION_CODE=$(( $(date -u +%s) - 1577836800 ))
          echo "versionCode : $VERSION_CODE"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Configure signing
        run: |
          sed -i '/signingConfigs {/a\        release {\n            storeFile file('\''release.keystore'\'')\n            storePassword System.getenv("KEYSTORE_PASSWORD")\n            keyAlias System.getenv("KEY_ALIAS")\n            keyPassword System.getenv("KEY_PASSWORD")\n        }' android/app/build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' android/app/build.gradle
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle

      - name: Configure Gradle
        run: |
          chmod +x android/gradlew
          {
            echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
            echo "android.enable16KbPageSizes=true"
          } >> android/gradle.properties

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/*.aab
